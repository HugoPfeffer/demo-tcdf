apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: zabbix-demo
  labels:
    app: sample-app
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: nginx
          image: registry.access.redhat.com/ubi9/nginx-122:latest
          ports:
            - containerPort: 8080
              protocol: TCP
        - name: load-generator
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - /bin/bash
            - -c
            - |
              while true; do
                for i in $(seq 1 10); do
                  curl -s -o /dev/null http://localhost:8080/ &
                done
                wait
                sleep 2
              done
        - name: zabbix-agent2
          image: zabbix/zabbix-agent2:6.0-ol-latest
          ports:
            - containerPort: 10050
              protocol: TCP
          env:
            - name: ZBX_SERVER_HOST
              value: zabbix-server.zabbix-demo.svc.cluster.local
            - name: ZBX_ACTIVESERVERS
              value: zabbix-server.zabbix-demo.svc.cluster.local:10051
            - name: ZBX_HOSTNAME
              value: sample-app-agent
            - name: ZBX_METADATAITEM
              value: system.uname
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app-agent
  namespace: zabbix-demo
  labels:
    app: sample-app
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    app: sample-app
  ports:
    - name: zabbix-agent
      port: 10050
      targetPort: 10050
      protocol: TCP
  type: ClusterIP
